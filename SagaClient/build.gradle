plugins {
    id 'java'
    id 'org.springframework.boot' version '3.3.5'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'de.playground'
version = '0.0.1-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()

}



dependencyManagement {
    imports {
        mavenBom "org.apache.camel.springboot:camel-spring-boot-bom:4.19.0"
    }
}


dependencies {
    implementation("org.springframework.boot:spring-boot-starter-web")

    implementation("org.apache.camel.springboot:camel-spring-boot-starter:4.19.0")
    implementation("org.apache.camel.springboot:camel-lra-starter:4.19.0")
    implementation("org.apache.camel.springboot:camel-undertow-starter:4.19.0")
    implementation "org.apache.camel.springboot:camel-http-starter:4.19.0"
    implementation "org.apache.camel.springboot:camel-saga-starter:4.19.0"
    implementation "org.apache.camel.springboot:camel-jdbc-starter:4.19.0"
    testImplementation("org.springframework.boot:spring-boot-starter-test")
}

tasks.named('test') {
    useJUnitPlatform()
}
